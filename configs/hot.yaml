# HOT-OSM HDX grid template.
#
# `iso3` is intentionally empty: pass it on the CLI so a single template
# drives the full sweep. Example for one country:
#
#   oex-cli osm NPL --config configs/hot.yaml --hdx-purge
#
# For the full 225-country grid:
#
#   xargs -a hot_countries.txt -I{} oex-cli osm {} --config configs/hot.yaml --hdx-purge
#
# Run `oex-cli osm-build-cache` once first to download the planet PBF
# (~87 GB). Each country then clips its own PBF out of it on demand via
# osmium-tool. Requires `osmium-tool` on PATH.

iso3: ""
key: hotosm
dataset_name: null
subnational: false
frequency: monthly

parallel:
  threads: null
  memory_gb: null

boundary:
  geom: null
  geoboundaries_release: CGAZ
  geoboundaries_level: ADM0
  buffer_meters: 5000

output:
  dir: output
  formats:
    - gpkg
    - shp
  metadata: true
  report:
    enabled: true
  s3:
    enabled: true
    prefix: "ISO3"
    acl: public-read

source:
  osm:
    engine: geofabrik
    planet_fallback: true
    pbf_path: data/osm/_pbf/planet-latest.osm.pbf
    auto_download_planet: true
  pcodes:
    enabled: true

hdx:
  push: true
  site: prod
  user_agent: hotosm-oex
  methodology_other: Volunteered geographic information
  title_template: "{country} : {category} (OpenStreetMap Export)"
  purge_existing_resources: true

categories_file: configs/examples/hot-schema.yaml
