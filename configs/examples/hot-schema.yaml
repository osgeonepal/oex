      notes: |
        Cultural and historic places across the region from OpenStreetMap.

        **About this layer.** Museums, galleries, theatres, places of worship, monuments, and historic sites tagged via `tourism`, `amenity`, `historic`, or `heritage`.

        **Typical uses:**
        - Heritage protection and conservation planning
        - Cultural mapping and tourism context
        - Conflict-zone heritage tracking

        **About OpenStreetMap.** OSM is a free, collaborative world map built by volunteers. Features are described by tags, which are key=value pairs (e.g., `historic=monument`). For the tags used in this layer, see [Key:tourism](https://wiki.openstreetmap.org/wiki/Key:tourism), [Key:amenity](https://wiki.openstreetmap.org/wiki/Key:amenity), [Key:historic](https://wiki.openstreetmap.org/wiki/Key:historic), and [Key:heritage](https://wiki.openstreetmap.org/wiki/Key:heritage) on the OSM Wiki. Learn more at [openstreetmap.org](https://www.openstreetmap.org).

        **Coverage.** OSM completeness varies by region: urban areas are usually well-mapped, remote areas may be incomplete. Cross-check critical decisions with field knowledge.

