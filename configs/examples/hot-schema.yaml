        - Part of many  [exports grid on HDX](https://data.humdata.org/organization/hot) by the [HOT](https://www.hotosm.org/en/)
      tags: [geodata, roads, transportation]
      license: hdx-odc-odbl
      license_url: https://opendatacommons.org/licenses/odbl/1-0/
      caveats: OpenStreetMap data is crowd sourced and cannot be considered to be exhaustive
      dataset_source: OpenStreetMap contributors
    osm:
      enabled: true
      filter:
        highway: true
      select:
        - feature_id AS id
        - tags['name'] AS name
        - tags['name:en'] AS name_en
        - tags['highway'] AS highway
        - tags['surface'] AS surface
        - tags['smoothness'] AS smoothness
        - tags['width'] AS width
        - tags['lanes'] AS lanes
        - tags['oneway'] AS oneway
        - tags['bridge'] AS bridge
        - tags['layer'] AS layer
        - tags['source'] AS source
      where: []
    overture:
      enabled: true
      theme: transportation
      feature_type: segment
      select:
        - id
        - names.primary AS name
        - names.common->>'en' AS name_en
        - class AS highway
        - road_surface[1].value AS surface
        - sources[1].dataset AS source
        - update_time AS update_time
