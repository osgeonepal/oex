      tags: [facilities-infrastructure, geodata, points of interest-poi]
      license: hdx-odc-odbl
      license_url: https://opendatacommons.org/licenses/odbl/1-0/
      caveats: OpenStreetMap data is crowd sourced and cannot be considered to be exhaustive
      dataset_source: OpenStreetMap contributors
    osm:
      enabled: true
      filter:
        tourism:
          [museum, gallery, theatre, artwork, attraction, zoo, aquarium, cinema]
        amenity:
          [
            arts_centre,
            library,
            community_centre,
            theatre,
            fountain,
            planetarium,
            public_bookcase,
            social_centre,
            stage,
            place_of_mourning,
            place_of_worship,
            cinema,
          ]
        historic: true
        heritage: true
      select:
        - feature_id AS id
        - tags['name'] AS name
        - tags['name:en'] AS name_en
        - tags['tourism'] AS tourism
        - tags['amenity'] AS amenity
        - tags['historic'] AS historic
        - tags['heritage'] AS heritage
        - tags['operator'] AS operator
        - tags['opening_hours'] AS opening_hours
        - tags['website'] AS website
        - tags['description'] AS description
        - tags['capacity'] AS capacity
        - tags['screen'] AS screen
      where: []
    overture:
      enabled: true
      theme: places
      feature_type: place
      select:
        - id
        - names.primary AS name
        - names.common->>'en' AS name_en
        - categories.primary AS category
        - addresses[1].freeform AS address
        - websites[1] AS website
        - confidence
        - sources[1].dataset AS source
        - update_time AS update_time
      where:
        - "categories.primary IN ('museum', 'gallery', 'theatre', 'artwork', 'attraction', 'zoo', 'aquarium', 'cinema', 'arts_centre', 'library', 'community_centre', 'cinema', 'place_of_worship', 'historic_site', 'monument', 'memorial', 'castle', 'fort', 'archaeological_site')"
    temporal:
      column: update_time

    transliterate:
      - target: name_latin
        source: name
        prefer: name_en
