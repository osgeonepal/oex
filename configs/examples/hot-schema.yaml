      tags: [geodata, hydrology, rivers]
      license: hdx-odc-odbl
      license_url: https://opendatacommons.org/licenses/odbl/1-0/
      caveats: OpenStreetMap data is crowd sourced and cannot be considered to be exhaustive
      dataset_source: OpenStreetMap contributors
    osm:
      enabled: true
      filter:
        waterway: true
        water: true
        natural: [water, wetland, bay]
      select:
        - feature_id AS id
        - tags['name'] AS name
        - tags['name:en'] AS name_en
        - tags['waterway'] AS waterway
        - tags['covered'] AS covered
        - tags['width'] AS width
        - tags['depth'] AS depth
        - tags['layer'] AS layer
        - tags['blockage'] AS blockage
        - tags['tunnel'] AS tunnel
        - tags['natural'] AS natural_class
        - tags['water'] AS water
        - tags['source'] AS source
      where: []
    overture:
      enabled: true
      theme: base
      feature_type: water
      select:
        - id
        - names.primary AS name
        - names.common->>'en' AS name_en
        - class AS waterway
