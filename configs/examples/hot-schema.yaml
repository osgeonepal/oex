# HOT-OSM HDX schema: 11 layers matching the HOT-OSM dataset grid published on
# the Humanitarian Data Exchange (e.g. hotosm_<iso3>_buildings,
# hotosm_<iso3>_roads, ...).
#
# Metadata (license, caveats, dataset_source, tags, notes) below is HOT's
# verbatim production metadata, copied from the live HDX exports' CKAN
# records. This makes the output drop-in compatible with HOT's HDX grid:
# pushing this schema produces datasets that humanitarian users already
# know how to consume.
#
# Source of truth: live HDX records, e.g.
#   https://data.humdata.org/dataset/hotosm_npl_buildings
#
# The OSM filter / select blocks mirror the tag expressions that HOT
# documents in each dataset's "notes" field. Each category also carries
# an `overture` block so the same schema can drive a multi-source export;
# set `overture.enabled: false` per category if you want OSM-only.
#
# Use as:
#   iso3: NPL
#   key: hotosm
#   categories_file: configs/examples/hot-schema.yaml

categories:
  - name: buildings
    hdx:
      notes: |
        Building footprints across the region from OpenStreetMap.

        **About this layer.** Every OSM feature tagged as a building, polygons and closed ways alike. Building parts are excluded.

        **Typical uses:**
        - Population estimation and density modelling
        - Damage assessment after disasters
        - Urban planning and basemap context

        **About OpenStreetMap.** OSM is a free, collaborative world map built by volunteers. Features are described by tags, which are key=value pairs (e.g., `building=yes`). For the tags used in this layer, see [Key:building](https://wiki.openstreetmap.org/wiki/Key:building) on the OSM Wiki. Learn more at [openstreetmap.org](https://www.openstreetmap.org).

        **Coverage.** OSM completeness varies by region: urban areas are usually well-mapped, remote areas may be incomplete. Cross-check critical decisions with field knowledge.

        ---

        This dataset is one of many [OpenStreetMap exports on HDX](https://data.humdata.org/organization/hot). See the [Humanitarian OpenStreetMap Team](https://www.hotosm.org/en/) for more. *OpenStreetMap exports for use in GIS applications.*
      tags: [facilities-infrastructure, geodata]
      license: hdx-odc-odbl
      license_url: https://opendatacommons.org/licenses/odbl/1-0/
      caveats: OpenStreetMap data is crowd sourced and cannot be considered to be exhaustive
      dataset_source: OpenStreetMap contributors
    osm:
      enabled: true
      filter:
        building: true
      select:
        - feature_id AS id
        - tags['name'] AS name
        - tags['name:en'] AS name_en
        - tags['name:ne'] AS name_ne
        - tags['building'] AS building
        - tags['building:levels'] AS building_levels
        - tags['building:materials'] AS building_materials
        - tags['addr:full'] AS addr_full
        - tags['addr:housenumber'] AS addr_housenumber
        - tags['addr:street'] AS addr_street
        - tags['addr:city'] AS addr_city
        - tags['office'] AS office
        - tags['source'] AS source
      where: []
    overture:
      enabled: true
      theme: buildings
      feature_type: building
      select:
        - id
        - names.primary AS name
        - names.common->>'en' AS name_en
        - class AS building
        - num_floors AS building_levels
        - roof_material AS building_materials
        - sources[1].dataset AS source
      where: []

    transliterate:
      - target: name_latin
        source: name
        prefer: name_en

  - name: roads
    hdx:
      notes: |
        Road network across the region from OpenStreetMap.

        **About this layer.** All roads, paths, and tracks tagged with `highway`: motorways, residential streets, service roads, footways, and trails.

        **Typical uses:**
        - Routing and accessibility analysis
        - Evacuation and response planning
        - Basemap context for transport studies

        **About OpenStreetMap.** OSM is a free, collaborative world map built by volunteers. Features are described by tags, which are key=value pairs (e.g., `highway=primary`). For the tags used in this layer, see [Key:highway](https://wiki.openstreetmap.org/wiki/Key:highway) on the OSM Wiki. Learn more at [openstreetmap.org](https://www.openstreetmap.org).

        **Coverage.** OSM completeness varies by region: urban areas are usually well-mapped, remote areas may be incomplete. Cross-check critical decisions with field knowledge.

        ---

        This dataset is one of many [OpenStreetMap exports on HDX](https://data.humdata.org/organization/hot). See the [Humanitarian OpenStreetMap Team](https://www.hotosm.org/en/) for more. *OpenStreetMap exports for use in GIS applications.*
