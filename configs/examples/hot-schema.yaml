# HOT-OSM HDX schema: 11 layers matching the HOT-OSM dataset grid published on
# the Humanitarian Data Exchange (e.g. hotosm_<iso3>_buildings,
# hotosm_<iso3>_roads, ...).
#
# Metadata (license, caveats, dataset_source, tags, notes) below is HOT's
# verbatim production metadata, copied from the live HDX exports' CKAN
# records. This makes the output drop-in compatible with HOT's HDX grid:
# pushing this schema produces datasets that humanitarian users already
# know how to consume.
#
# Source of truth: live HDX records, e.g.
#   https://data.humdata.org/dataset/hotosm_npl_buildings
#
# The OSM filter / select blocks mirror the tag expressions that HOT
# documents in each dataset's "notes" field. Each category also carries
# an `overture` block so the same schema can drive a multi-source export;
# set `overture.enabled: false` per category if you want OSM-only.
#
# Use as:
#   iso3: NPL
#   key: hotosm
#   categories_file: configs/examples/hot-schema.yaml

categories:
  - name: buildings
    skip_pcodes: false
    hdx:
      title: Buildings
      notes: |
        Building footprints across the region from OSM. Includes every feature tagged as a building (`building=*`), from residential homes through hospitals, schools, and places of worship. Useful for population estimation, damage assessment, and urban planning.

        OpenStreetMap is a free, collaborative world map built by volunteers. Completeness varies by region: urban areas are usually well-mapped, remote areas may be incomplete. Cross-check critical decisions with local field knowledge.

        - Source: [OpenStreetMap](https://www.openstreetmap.org)
        - OSM tags: [Key:building](https://wiki.openstreetmap.org/wiki/Key:building)
        - Part of many  [exports grid on HDX](https://data.humdata.org/organization/hot) by the [HOT](https://www.hotosm.org/en/)
      tags: [facilities-infrastructure, geodata]
      license: hdx-odc-odbl
      license_url: https://opendatacommons.org/licenses/odbl/1-0/
      caveats: OpenStreetMap data is crowd sourced and cannot be considered to be exhaustive
      dataset_source: OpenStreetMap contributors
    osm:
      enabled: true
      filter:
        building: true
      select:
        - feature_id AS id
        - tags['name'] AS name
        - tags['name:en'] AS name_en
        - tags['building'] AS building
        - tags['building:levels'] AS building_levels
        - tags['building:materials'] AS building_materials
        - tags['addr:full'] AS addr_full
        - tags['addr:housenumber'] AS addr_housenumber
        - tags['addr:street'] AS addr_street
        - tags['addr:city'] AS addr_city
        - tags['office'] AS office
        - tags['source'] AS source
      where: []
    overture:
      enabled: true
      theme: buildings
      feature_type: building
      select:
        - id
        - names.primary AS name
        - names.common->>'en' AS name_en
        - class AS building
        - num_floors AS building_levels
        - roof_material AS building_materials
        - sources[1].dataset AS source
        - update_time AS update_time
      where: []

    temporal:
      column: update_time

    transliterate:
      - target: name_latin
        source: name
        prefer: name_en

  - name: roads
    hdx:
      title: Roads
      notes: |
        Road network across the region from OSM. Includes everything tagged with `highway`: motorways, residential streets, service roads, footways, and trails. Useful for routing, accessibility analysis, and evacuation planning.

        OpenStreetMap is a free, collaborative world map built by volunteers. Completeness varies by region: urban areas are usually well-mapped, remote areas may be incomplete. Cross-check critical decisions with local field knowledge.

