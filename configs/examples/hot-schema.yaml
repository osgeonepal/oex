# HOT-OSM HDX schema: 11 layers matching the HOT-OSM dataset grid published on
# the Humanitarian Data Exchange (e.g. hotosm_<iso3>_buildings,
# hotosm_<iso3>_roads, ...).
#
# Metadata (license, caveats, dataset_source, tags, notes) below is HOT's
# verbatim production metadata, copied from the live HDX exports' CKAN
# records. This makes the output drop-in compatible with HOT's HDX grid:
# pushing this schema produces datasets that humanitarian users already
# know how to consume.
#
# Source of truth: live HDX records, e.g.
#   https://data.humdata.org/dataset/hotosm_npl_buildings
#
# The OSM filter / select blocks mirror the tag expressions that HOT
# documents in each dataset's "notes" field. Each category also carries
# an `overture` block so the same schema can drive a multi-source export;
# set `overture.enabled: false` per category if you want OSM-only.
#
# Use as:
#   iso3: NPL
#   key: hotosm
#   categories_file: configs/examples/hot-schema.yaml

categories:
  # 1. Buildings ---------------------------------------------------------------
  - name: buildings
    hdx:
      notes: |
        OpenStreetMap exports for use in GIS applications.
        This theme includes all OpenStreetMap features in this area matching:
          building IS NOT NULL
      tags: [facilities-infrastructure, geodata]
      license: hdx-odc-odbl
      license_url: https://opendatacommons.org/licenses/odbl/1-0/
      caveats: OpenStreetMap data is crowd sourced and cannot be considered to be exhaustive.
      dataset_source: OpenStreetMap contributors
    osm:
      enabled: true
      filter:
        building: true
      select:
        - feature_id AS id
        - tags['name'][1] AS name
        - tags['name:en'][1] AS name_en
        - tags['name:ne'][1] AS name_ne
        - tags['building'][1] AS building
        - tags['building:levels'][1] AS building_levels
        - tags['building:materials'][1] AS building_materials
        - tags['addr:full'][1] AS addr_full
        - tags['addr:housenumber'][1] AS addr_housenumber
        - tags['addr:street'][1] AS addr_street
        - tags['addr:city'][1] AS addr_city
        - tags['office'][1] AS office
        - tags['source'][1] AS source
      where: []
    overture:
      enabled: true
      theme: buildings
      feature_type: building
      select:
        - id
        - names.primary AS name
        - names.common->'en' AS name_en
        - class AS building
        - num_floors AS building_levels
        - roof_material AS building_materials
        - sources[1].dataset AS source
      where: []

  # 2. Roads ------------------------------------------------------------------
  - name: roads
    hdx:
      notes: |
        OpenStreetMap exports for use in GIS applications.
        This theme includes all OpenStreetMap features in this area matching:
          highway IS NOT NULL
      tags: [facilities-infrastructure, geodata, transportation]
      license: hdx-odc-odbl
      license_url: https://opendatacommons.org/licenses/odbl/1-0/
      caveats: OpenStreetMap data is crowd sourced and cannot be considered to be exhaustive.
      dataset_source: OpenStreetMap contributors
    osm:
      enabled: true
      filter:
        highway: true
      select:
        - feature_id AS id
        - tags['name'][1] AS name
        - tags['name:en'][1] AS name_en
        - tags['name:ne'][1] AS name_ne
        - tags['highway'][1] AS highway
        - tags['surface'][1] AS surface
        - tags['smoothness'][1] AS smoothness
        - tags['width'][1] AS width
        - tags['lanes'][1] AS lanes
        - tags['oneway'][1] AS oneway
        - tags['bridge'][1] AS bridge
        - tags['layer'][1] AS layer
        - tags['source'][1] AS source
      where: []
    overture:
      enabled: true
      theme: transportation
      feature_type: segment
      select:
        - id
        - names.primary AS name
        - names.common->'en' AS name_en
        - class AS highway
        - road_surface[1].value AS surface
        - sources[1].dataset AS source
      where: []

  # 3. Waterways --------------------------------------------------------------
  - name: waterways
    hdx:
      notes: |
        OpenStreetMap exports for use in GIS applications.
        This theme includes all OpenStreetMap features in this area matching:
          waterway IS NOT NULL OR water IS NOT NULL OR
          natural IN ('water', 'wetland', 'bay')
      tags: [environment, geodata]
      license: hdx-odc-odbl
      license_url: https://opendatacommons.org/licenses/odbl/1-0/
      caveats: OpenStreetMap data is crowd sourced and cannot be considered to be exhaustive.
      dataset_source: OpenStreetMap contributors
    osm:
      enabled: true
      filter:
        waterway: true
        water: true
        natural: [water, wetland, bay]
      select:
        - feature_id AS id
        - tags['name'][1] AS name
        - tags['name:en'][1] AS name_en
        - tags['name:ne'][1] AS name_ne
        - tags['waterway'][1] AS waterway
        - tags['covered'][1] AS covered
        - tags['width'][1] AS width
        - tags['depth'][1] AS depth
        - tags['layer'][1] AS layer
        - tags['blockage'][1] AS blockage
        - tags['tunnel'][1] AS tunnel
        - tags['natural'][1] AS natural_class
        - tags['water'][1] AS water
        - tags['source'][1] AS source
      where: []
    overture:
      enabled: true
      theme: base
      feature_type: water
      select:
        - id
        - names.primary AS name
        - names.common->'en' AS name_en
        - class AS waterway
        - sources[1].dataset AS source
      where: []

  # 4. Railways ---------------------------------------------------------------
  - name: railways
    hdx:
      notes: |
        OpenStreetMap exports for use in GIS applications.
        This theme includes all OpenStreetMap features in this area matching:
          railway IN ('rail', 'station')
      tags: [facilities-infrastructure, geodata, transportation]
      license: hdx-odc-odbl
      license_url: https://opendatacommons.org/licenses/odbl/1-0/
      caveats: OpenStreetMap data is crowd sourced and cannot be considered to be exhaustive.
      dataset_source: OpenStreetMap contributors
    osm:
      enabled: true
      filter:
        railway: [rail, station]
      select:
        - feature_id AS id
        - tags['name'][1] AS name
        - tags['name:en'][1] AS name_en
        - tags['name:ne'][1] AS name_ne
        - tags['railway'][1] AS railway
        - tags['ele'][1] AS ele
        - tags['operator:type'][1] AS operator_type
        - tags['layer'][1] AS layer
        - tags['addr:full'][1] AS addr_full
        - tags['addr:city'][1] AS addr_city
        - tags['source'][1] AS source
      where: []
    overture:
      enabled: false

  # 5. Education facilities ---------------------------------------------------
  - name: education_facilities
    hdx:
      notes: |
        OpenStreetMap exports for use in GIS applications.
        This theme includes all OpenStreetMap features in this area matching:
          amenity IN ('kindergarten', 'school', 'college', 'university') OR
          building IN ('kindergarten', 'school', 'college', 'university')
      tags: [education, facilities-infrastructure, geodata]
      license: hdx-odc-odbl
      license_url: https://opendatacommons.org/licenses/odbl/1-0/
      caveats: OpenStreetMap data is crowd sourced and cannot be considered to be exhaustive.
      dataset_source: OpenStreetMap contributors
    osm:
      enabled: true
      filter:
        amenity: [kindergarten, school, college, university]
        building: [kindergarten, school, college, university]
      select:
        - feature_id AS id
        - tags['name'][1] AS name
        - tags['name:en'][1] AS name_en
        - tags['name:ne'][1] AS name_ne
        - tags['amenity'][1] AS amenity
        - tags['building'][1] AS building
        - tags['operator:type'][1] AS operator_type
        - tags['capacity:persons'][1] AS capacity_persons
        - tags['addr:full'][1] AS addr_full
        - tags['addr:city'][1] AS addr_city
        - tags['source'][1] AS source
      where: []
    overture:
      enabled: true
      theme: places
      feature_type: place
      select:
        - id
        - names.primary AS name
        - names.common->'en' AS name_en
        - categories.primary AS amenity
        - addresses[1].freeform AS addr_full
        - sources[1].dataset AS source
      where:
        - "categories.primary IN ('school', 'university', 'college', 'kindergarten')"

  # 6. Health facilities ------------------------------------------------------
  - name: health_facilities
    hdx:
      notes: |
        OpenStreetMap exports for use in GIS applications.
        This theme includes all OpenStreetMap features in this area matching:
          healthcare IS NOT NULL OR
          amenity IN ('doctors', 'dentist', 'clinic', 'hospital', 'pharmacy')
      tags: [facilities-infrastructure, geodata, health]
      license: hdx-odc-odbl
      license_url: https://opendatacommons.org/licenses/odbl/1-0/
      caveats: OpenStreetMap data is crowd sourced and cannot be considered to be exhaustive.
      dataset_source: OpenStreetMap contributors
    osm:
      enabled: true
      filter:
        healthcare: true
        amenity: [doctors, dentist, clinic, hospital, pharmacy]
      select:
        - feature_id AS id
        - tags['name'][1] AS name
        - tags['name:en'][1] AS name_en
        - tags['name:ne'][1] AS name_ne
        - tags['amenity'][1] AS amenity
        - tags['building'][1] AS building
        - tags['healthcare'][1] AS healthcare
        - tags['healthcare:speciality'][1] AS healthcare_speciality
        - tags['operator:type'][1] AS operator_type
        - tags['capacity:persons'][1] AS capacity_persons
        - tags['addr:full'][1] AS addr_full
        - tags['addr:city'][1] AS addr_city
        - tags['source'][1] AS source
      where: []
    overture:
      enabled: true
      theme: places
      feature_type: place
      select:
        - id
        - names.primary AS name
        - names.common->'en' AS name_en
        - categories.primary AS amenity
        - addresses[1].freeform AS addr_full
        - sources[1].dataset AS source
      where:
        - "categories.primary IN ('hospital', 'clinic', 'doctor', 'dentist', 'pharmacy')"

  # 7. Populated places -------------------------------------------------------
  - name: populated_places
    hdx:
      notes: |
        OpenStreetMap exports for use in GIS applications.
        This theme includes all OpenStreetMap features in this area matching:
          place IN ('isolated_dwelling', 'town', 'village', 'hamlet', 'city') OR
          landuse = 'residential'
      tags: [geodata, populated places-settlements]
      license: hdx-odc-odbl
      license_url: https://opendatacommons.org/licenses/odbl/1-0/
      caveats: OpenStreetMap data is crowd sourced and cannot be considered to be exhaustive.
      dataset_source: OpenStreetMap contributors
    osm:
      enabled: true
      filter:
        place: [isolated_dwelling, town, village, hamlet, city]
        landuse: [residential]
      select:
        - feature_id AS id
        - tags['name'][1] AS name
        - tags['name:en'][1] AS name_en
        - tags['name:ne'][1] AS name_ne
        - tags['place'][1] AS place
        - tags['landuse'][1] AS landuse
        - tags['population'][1] AS population
        - tags['is_in'][1] AS is_in
        - tags['source'][1] AS source
      where: []
    overture:
      enabled: true
      theme: divisions
      feature_type: division
      select:
        - id
        - names.primary AS name
        - names.common->'en' AS name_en
        - subtype AS place
        - population
        - sources[1].dataset AS source
      where:
        - "subtype = 'locality'"

  # 8. Financial services -----------------------------------------------------
  - name: financial_services
    hdx:
      notes: |
        OpenStreetMap exports for use in GIS applications.
        This theme includes all OpenStreetMap features in this area matching:
          amenity IN ('mobile_money_agent', 'bureau_de_change', 'bank',
                      'microfinance', 'atm', 'sacco', 'money_transfer',
                      'post_office')
      tags: [economics, facilities-infrastructure, geodata]
      license: hdx-odc-odbl
      license_url: https://opendatacommons.org/licenses/odbl/1-0/
      caveats: OpenStreetMap data is crowd sourced and cannot be considered to be exhaustive.
      dataset_source: OpenStreetMap contributors
    osm:
      enabled: true
      filter:
        amenity: [mobile_money_agent, bureau_de_change, bank, microfinance, atm, sacco, money_transfer, post_office]
      select:
        - feature_id AS id
        - tags['name'][1] AS name
        - tags['name:en'][1] AS name_en
        - tags['name:ne'][1] AS name_ne
        - tags['amenity'][1] AS amenity
        - tags['operator'][1] AS operator
        - tags['network'][1] AS network
        - tags['addr:full'][1] AS addr_full
        - tags['addr:city'][1] AS addr_city
        - tags['source'][1] AS source
      where: []
    overture:
      enabled: false

  # 9. Airports ---------------------------------------------------------------
  - name: airports
    hdx:
      notes: |
        OpenStreetMap exports for use in GIS applications.
        This theme includes all OpenStreetMap features in this area matching:
          aeroway IS NOT NULL OR building = 'aerodrome' OR
          emergency = 'landing_site' OR emergency:helipad IS NOT NULL
      tags: [aviation, facilities-infrastructure, geodata, transportation]
      license: hdx-odc-odbl
      license_url: https://opendatacommons.org/licenses/odbl/1-0/
      caveats: OpenStreetMap data is crowd sourced and cannot be considered to be exhaustive.
      dataset_source: OpenStreetMap contributors
    osm:
      enabled: true
      filter:
        aeroway: true
        building: [aerodrome]
        emergency: [landing_site]
        emergency:helipad: true
      select:
        - feature_id AS id
        - tags['name'][1] AS name
        - tags['name:en'][1] AS name_en
        - tags['name:ne'][1] AS name_ne
        - tags['aeroway'][1] AS aeroway
        - tags['building'][1] AS building
        - tags['emergency'][1] AS emergency
        - tags['emergency:helipad'][1] AS emergency_helipad
        - tags['operator:type'][1] AS operator_type
        - tags['capacity:persons'][1] AS capacity_persons
        - tags['addr:full'][1] AS addr_full
        - tags['addr:city'][1] AS addr_city
        - tags['source'][1] AS source
      where: []
    overture:
      enabled: true
      theme: places
      feature_type: place
      select:
        - id
        - names.primary AS name
        - names.common->'en' AS name_en
        - categories.primary AS aeroway
        - addresses[1].freeform AS addr_full
        - sources[1].dataset AS source
      where:
        - "categories.primary IN ('airport', 'heliport')"

  # 10. Sea ports -------------------------------------------------------------
  - name: sea_ports
    hdx:
      notes: |
        OpenStreetMap exports for use in GIS applications.
        This theme includes all OpenStreetMap features in this area matching:
          amenity = 'ferry_terminal' OR building = 'ferry_terminal' OR
          port IS NOT NULL
      tags: [facilities-infrastructure, geodata, ports, transportation]
      license: hdx-odc-odbl
      license_url: https://opendatacommons.org/licenses/odbl/1-0/
      caveats: OpenStreetMap data is crowd sourced and cannot be considered to be exhaustive.
      dataset_source: OpenStreetMap contributors
    osm:
      enabled: true
      filter:
        amenity: [ferry_terminal]
        building: [ferry_terminal]
        port: true
      select:
        - feature_id AS id
        - tags['name'][1] AS name
        - tags['name:en'][1] AS name_en
        - tags['name:ne'][1] AS name_ne
        - tags['amenity'][1] AS amenity
        - tags['building'][1] AS building
        - tags['port'][1] AS port
        - tags['operator:type'][1] AS operator_type
        - tags['addr:full'][1] AS addr_full
        - tags['addr:city'][1] AS addr_city
        - tags['source'][1] AS source
      where: []
    overture:
      enabled: false

  # 11. Points of interest ----------------------------------------------------
  - name: points_of_interest
    hdx:
      notes: |
        OpenStreetMap exports for use in GIS applications.
        This theme includes all OpenStreetMap features in this area matching:
          amenity IS NOT NULL OR man_made IS NOT NULL OR
          shop IS NOT NULL OR tourism IS NOT NULL
      tags: [facilities-infrastructure, geodata, points of interest-poi]
